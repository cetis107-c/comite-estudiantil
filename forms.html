<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votación – Comité Estudiantil CETis 107</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Raleway:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple-deep:  #4a2c7a;
      --purple-mid:   #6347a8;
      --purple-vivid: #7b5dc7;
      --purple-light: #9b85d4;
      --purple-pale:  #baaee0;
      --overlay:      rgba(58, 28, 98, 0.78);
      --text-white:   #f5f0ff;
      --text-soft:    rgba(245,240,255,0.72);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; font-family: 'Nunito', sans-serif; color: var(--text-white); overflow-x: hidden; }

    /* ── BACKGROUND ── */
    .bg-slideshow { position: fixed; inset: 0; z-index: 0; }
    .bg-slideshow .slide {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0; animation: slideShow 54s infinite;
    }
    .bg-slideshow .slide:nth-child(1) { background-image: url('img1.jpg'); animation-delay: 0s; }
    .bg-slideshow .slide:nth-child(2) { background-image: url('img2.jpg'); animation-delay: 6s; }
    .bg-slideshow .slide:nth-child(3) { background-image: url('img3.jpg'); animation-delay: 12s; }
    .bg-slideshow .slide:nth-child(4) { background-image: url('img4.jpg'); animation-delay: 18s; }
    .bg-slideshow .slide:nth-child(5) { background-image: url('img5.jpg'); animation-delay: 24s; }
    .bg-slideshow .slide:nth-child(6) { background-image: url('img6.jpg'); animation-delay: 30s; }
    .bg-slideshow .slide:nth-child(7) { background-image: url('img7.jpg'); animation-delay: 36s; }
    .bg-slideshow .slide:nth-child(8) { background-image: url('img8.jpg'); animation-delay: 42s; }
    .bg-slideshow .slide:nth-child(9) { background-image: url('img9.jpg'); animation-delay: 48s; }

    @keyframes slideShow {
      0%  { opacity: 0; } 5%  { opacity: 1; }
      16% { opacity: 1; } 22% { opacity: 0; } 100% { opacity: 0; }
    }

    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: var(--overlay);
    }
    .bg-overlay::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(18,4,45,0.6) 100%);
    }

    /* ── PAGE ── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 60px;
    }

    /* ── TOP NAV ── */
    .top-nav {
      width: 100%; max-width: 820px;
      display: flex; align-items: center;
      margin-bottom: 28px;
      animation: fadeDown 0.6s ease both;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(74,44,122,0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      padding: 9px 20px;
      color: #fff; font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 0.88rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-back:hover { background: rgba(99,71,168,0.7); transform: translateX(-4px); }

    /* ── HEADER ── */
    .header {
      text-align: center; margin-bottom: 30px;
      animation: fadeDown 0.7s 0.1s ease both;
    }
    .header .eyebrow {
      font-family: 'Raleway', sans-serif;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.26em; text-transform: uppercase;
      color: var(--purple-pale); margin-bottom: 10px;
    }
    .header h1 {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900; line-height: 1.05;
      text-shadow: 0 4px 30px rgba(0,0,0,0.45);
    }
    .header h1 span { color: var(--purple-pale); }
    .header p {
      margin-top: 10px; font-size: 0.97rem;
      color: var(--text-soft); max-width: 440px; margin-inline: auto;
      line-height: 1.6;
    }
    .divider {
      width: 56px; height: 3px;
      background: linear-gradient(90deg, var(--purple-light), var(--purple-vivid));
      border-radius: 99px; margin: 16px auto 0;
    }

    /* ── FORM CONTAINER ── */
    .form-wrap {
      width: 100%; max-width: 820px;
      background: rgba(74,44,122,0.4);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 70px rgba(18,4,50,0.6);
      animation: fadeUp 0.7s 0.2s ease both;
      position: relative;
    }

    /* loading shimmer */
    .form-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(155,133,212,0.08), transparent);
      animation: shimmer 2s infinite;
      z-index: 1; pointer-events: none;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .form-wrap iframe {
      display: block;
      width: 100%;
      height: 75vh;
      min-height: 500px;
      border: none;
    }

    /* ── INSTAGRAM BADGE ── */
    .ig-badge {
      position: fixed; bottom: 24px; right: 22px;
      z-index: 11;
      display: flex; align-items: center; gap: 9px;
      background: rgba(74,44,122,0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      padding: 9px 16px 9px 10px;
      text-decoration: none; color: #fff;
      font-size: 0.82rem; font-weight: 700;
      box-shadow: 0 4px 20px rgba(20,5,50,0.45);
      transition: transform 0.2s, background 0.2s;
      animation: fadeIn 1s 0.8s ease both;
    }
    .ig-badge:hover { transform: scale(1.05); background: rgba(99,71,168,0.88); }
    .ig-icon { width: 28px; height: 28px; flex-shrink: 0; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    @media (max-width: 520px) {
      .form-wrap iframe { height: 80vh; }
      .ig-badge span { display: none; }
      .ig-badge { padding: 9px; border-radius: 50%; }
    }
  </style>
</head>
<body>

  <div class="bg-slideshow">
    <div class="slide"></div><div class="slide"></div><div class="slide"></div>
    <div class="slide"></div><div class="slide"></div><div class="slide"></div>
    <div class="slide"></div><div class="slide"></div><div class="slide"></div>
  </div>
  <div class="bg-overlay"></div>

  <main class="page">

    <nav class="top-nav">
      <a href="propuestas.html" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Ver Temáticas
      </a>
    </nav>

    <header class="header">
      <p class="eyebrow">CETis No. 107 &nbsp;·&nbsp; Comité Estudiantil</p>
      <h1>¡Emite tu <span>Voto!</span></h1>
      <p>Tu opinión cuenta. Elige la temática que más te representa y haz que suceda.</p>
      <div class="divider"></div>
    </header>

    <!-- Embedded Google Form -->
    <div class="form-wrap">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfDummy_REPLACE_WITH_REAL_ID/viewform?embedded=true"
        id="gform"
        title="Votación Comité Estudiantil"
        allowfullscreen
      >
        Cargando formulario…
      </iframe>
    </div>

  </main>

  <!-- Instagram badge -->
  <a href="https://www.instagram.com/_comiteestudiantil" target="_blank" rel="noopener" class="ig-badge" aria-label="Instagram del Comité">
    <svg class="ig-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="ig3" cx="30%" cy="107%" r="130%">
          <stop offset="0%" stop-color="#ffd676"/>
          <stop offset="25%" stop-color="#f9a241"/>
          <stop offset="50%" stop-color="#e4405f"/>
          <stop offset="75%" stop-color="#c13584"/>
          <stop offset="100%" stop-color="#833ab4"/>
        </radialGradient>
      </defs>
      <rect width="48" height="48" rx="12" fill="url(#ig3)"/>
      <rect x="13" y="13" width="22" height="22" rx="6" stroke="white" stroke-width="2.5" fill="none"/>
      <circle cx="24" cy="24" r="5.5" stroke="white" stroke-width="2.5" fill="none"/>
      <circle cx="31.5" cy="16.5" r="1.5" fill="white"/>
    </svg>
    <span>@_comiteestudiantil</span>
  </a>

  <script>
    // Google Forms short links (forms.gle) redirect to the full URL.
    // To embed, we need: https://docs.google.com/forms/d/e/FORM_ID/viewform?embedded=true
    // We resolve the short URL by opening it in the iframe directly —
    // Google Forms supports embedding via the short link too.
    document.getElementById('gform').src = 'https://forms.gle/1xSR6QVsmQ4y9P616';
    // Si el formulario no carga, prueba reemplazando la línea de arriba con:
    // document.getElementById('gform').src = 'https://docs.google.com/forms/d/e/TU_ID_AQUI/viewform?embedded=true';
  </script>

</body>
</html>
